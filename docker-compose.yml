# version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tradingia-postgres
    environment:
      POSTGRES_USER: trading_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-trading_secure_pass_change_me}
      POSTGRES_DB: tradingia_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - trading_network
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: tradingia-ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - trading_network
    restart: unless-stopped
    entrypoint: 
      - "/bin/sh"
      - "-c"
      - "ollama serve & sleep 5 && ollama pull qwen2.5-coder:3b && wait"
    
  trading_app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tradingia-app
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://trading_user:${DB_PASSWORD:-trading_secure_pass_change_me}@postgres:5432/tradingia_db
      LLM_PROVIDER: ${LLM_PROVIDER:-local}
      LLM_BASE_URL: http://ollama:11434
      LLM_MODEL: ${LLM_MODEL:-qwen2.5-coder:3b}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-dummy_key}
      GEMINI_BASE_URL: https://generativelanguage.googleapis.com/v1beta/openai
      GEMINI_MODEL: gemini-2.0-flash
      NANSEN_API_KEY: ${NANSEN_API_KEY:-dummy_key}
      NANSEN_BASE_URL: https://api.nansen.ai/api/v1
      BINANCE_API_KEY: ${BINANCE_API_KEY:-}
      BINANCE_SECRET: ${BINANCE_SECRET:-}
      MEXC_API_KEY: ${MEXC_API_KEY:-}
      MEXC_SECRET: ${MEXC_SECRET:-}
      DEBUG_MODE: ${DEBUG_MODE:-true}
      POLLING_INTERVAL_MINUTES: ${POLLING_INTERVAL_MINUTES:-15}
      MIN_INFLOW_LIMIT: ${MIN_INFLOW_LIMIT:-100000}
      TAKE_PROFIT_PCT: ${TAKE_PROFIT_PCT:-5.0}
      STOP_LOSS_PCT: ${STOP_LOSS_PCT:--2.0}
      MAX_DAILY_DRAWDOWN_PCT: ${MAX_DAILY_DRAWDOWN_PCT:-5.0}
      MAX_OPEN_TRADES: ${MAX_OPEN_TRADES:-5}
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      PYTHONUNBUFFERED: 1
      PYTHONDONTWRITEBYTECODE: 1
    ports:
      - "8501:8501"
      - "8000:8000"
    volumes:
      - ./app:/app/app
      - ./logs:/app/logs
      - trading_cache:/home/trader/.cache
    networks:
      - trading_network
    restart: unless-stopped
    command: streamlit run app/ui/dashboard.py --server.port=8501 --server.address=0.0.0.0

volumes:
  postgres_data:
  ollama_data:
  trading_cache:

networks:
  trading_network:
    driver: bridge